<html lang="en">
<head>

<style>
  :root {
    --bg: #0a0a0f; --surface: #111118; --card: #16161f;
    --accent: #c9a84c; --accent2: #e8c97a; --text: #e8e6e0;
    --muted: #8a8880; --border: #2a2a35;

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-weight: 300; overflow-x: hidden; }

  nav { position: fixed; top: 0; width: 100%; z-index: 100; padding: 1.2rem 4rem; display: flex; justify-content: space-between; align-items: center; background: rgba(10,10,15,0.88); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
  .nav-logo { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--accent); letter-spacing: 1px; }
  .nav-links { display: flex; gap: 2rem; list-style: none; }

  .nav-links a:hover { color: var(--accent); }

  #home { min-height: 100vh; display: flex; align-items: center; padding: 8rem 4rem 4rem; position: relative; overflow: hidden; }
  .hero-bg { position: absolute; inset: 0; background: radial-gradient(ellipse 60% 60% at 80% 50%, rgba(201,168,76,0.07) 0%, transparent 70%), radial-gradient(ellipse 40% 40% at 10% 80%, rgba(201,168,76,0.04) 0%, transparent 60%); }
  .hero-grid { position: absolute; inset: 0; background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px); background-size: 60px 60px; opacity: 0.3; }
  .hero-inner { display: flex; align-items: center; gap: 4rem; width: 100%; max-width: 1100px; position: relative; }
  .hero-text { flex: 1; }
  .hero-photo { flex-shrink: 0; width: 240px; height: 240px; border-radius: 50%; overflow: hidden; border: 3px solid var(--accent); box-shadow: 0 0 50px rgba(201,168,76,0.25); opacity: 0; animation: fadeUp 0.8s 0.5s forwards; }
  .hero-photo img { width: 100%; height: 100%; object-fit: cover; }
  .hero-hello { font-size: 1.3rem; color: var(--text); margin-bottom: 0.3rem; opacity: 0; animation: fadeUp 0.8s 0.2s forwards; font-weight: 300; }
  .hero-name { font-family: 'Playfair Display', serif; font-size: clamp(3.5rem, 8vw, 7rem); font-weight: 900; line-height: 1; margin-bottom: 1rem; opacity: 0; animation: fadeUp 0.8s 0.4s forwards; }
  .hero-name span { color: var(--accent); }
  .hero-iam { font-size: 1.5rem; color: var(--text); margin-bottom: 1.8rem; opacity: 0; animation: fadeUp 0.8s 0.6s forwards; font-weight: 400; }
  .hero-role { color: var(--accent); font-weight: 600; }

  .btn-primary { padding: 0.85rem 2rem; background: var(--accent); color: #0a0a0f; font-weight: 500; font-size: 0.82rem; letter-spacing: 1px; text-decoration: none; text-transform: uppercase; transition: all 0.3s; font-family: 'DM Mono', monospace; }

  .list-items { list-style: none; }

  #experience { background: var(--surface); }
  .timeline { position: relative; padding-left: 2rem; }
  .timeline::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 1px; background: var(--border); }
  .timeline-item { position: relative; margin-bottom: 3.5rem; padding-left: 2rem; }
  .timeline-item::before { content: ''; position: absolute; left: -2.4rem; top: 0.5rem; width: 10px; height: 10px; background: var(--accent); border-radius: 50%; }
  .timeline-date { font-family: 'DM Mono', monospace; font-size: 0.72rem; color: var(--accent); letter-spacing: 2px; margin-bottom: 0.5rem; }
  .timeline-role { font-family: 'Playfair Display', serif; font-size: 1.3rem; margin-bottom: 0.3rem; }
  .timeline-org { color: var(--muted); font-size: 0.85rem; margin-bottom: 1rem; }
  .timeline-desc { color: #b0ae9a; font-size: 0.92rem; line-height: 1.8; margin-bottom: 1rem; }
  .timeline-bullets { list-style: none; }

  .timeline-bullets li::before { content: '→'; position: absolute; left: 0; color: var(--accent); }

  .edu-card { padding: 2rem; border: 1px solid var(--border); background: var(--card); transition: border-color 0.3s; }
  .edu-card:hover { border-color: var(--accent); }
  .edu-year { font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--accent); letter-spacing: 2px; margin-bottom: 0.7rem; }
  .edu-degree { font-family: 'Playfair Display', serif; font-size: 1.05rem; margin-bottom: 0.5rem; }
  .edu-school { color: var(--muted); font-size: 0.85rem; line-height: 1.6; }
  .edu-detail { color: #b0ae9a; font-size: 0.82rem; margin-top: 0.6rem; font-style: italic; line-height: 1.6; }

  #projects { background: var(--surface); }
  .project-card { padding: 2.5rem; border: 1px solid var(--border); background: var(--card); margin-bottom: 2rem; transition: border-color 0.3s;
